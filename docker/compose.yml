# docker/compose.yml — memory-pgvector dev/test stack
#
# Profiles:
#   test → CI + local one-shot test runs (pg + test container)
#   dev  → just the DB; host runs pytest
#
# Forked from andreab67/hermes-memory-pgvector (BSD-3-Clause)

name: memory-pgvector

services:
  pg:
    image: pgvector/pgvector:pg16
    container_name: memory-pgvector-pg
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hermes_test
    volumes:
      - pg_data:/var/lib/postgresql/data
      # Migration is applied by the test entrypoint from /app/pgvector/migrations/
      # (COPY'd in the Dockerfile). Skip the /docker-entrypoint-initdb.d/ mount —
      # pgvector's base image has a pre-existing 001_schema.sql/ directory there
      # that conflicts with our file bind-mount in some Docker setups.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hermes_test"]
      interval: 2s
      timeout: 5s
      retries: 30
    # Exposed (not published) so the test container can reach it via the
    # internal docker network as `pg:5432`. For the dev profile, run with
    # `--service-ports` to publish 5432 to the host so host-side pytest
    # can connect at `localhost:5432`.
    expose:
      - "5432"

  test:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: runtime
    image: memory-pgvector:test
    container_name: memory-pgvector-test
    profiles: ["test"]
    depends_on:
      pg:
        condition: service_healthy
    environment:
      CMD_PROFILE: test
      PG_TEST_HOST: pg
      PG_TEST_PORT: "5432"
      PG_TEST_DSN: "dbname=hermes_test user=postgres password=postgres host=pg"
    # PG_TEST_EMBED_URL is intentionally unset → live embed test skips (Phase 0)

volumes:
  pg_data:
    name: memory-pgvector-pg-data

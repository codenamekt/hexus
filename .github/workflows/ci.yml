name: CI

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} -f docker/Dockerfile .

      - name: Run tests
        env:
          PG_TEST_DSN: "dbname=hermes_test user=postgres host=pg"
        run: |
          docker compose -f docker/compose.yml --profile test up -d pg
          # Wait for PostgreSQL to be ready
          for i in {1..10}; do
            docker exec memory-pgvector-test pg_isready -h pg && break || sleep 1
          done
          docker compose -f docker/compose.yml --profile test run --rm test

      - name: Push image to GHCR
        run: |
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
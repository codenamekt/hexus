name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Ruff Lint Check
        uses: astral-sh/ruff-action@v3
        with:
          args: 'check'

      - name: Run Ruff Format Check
        uses: astral-sh/ruff-action@v3
        with:
          args: 'format --check'

  packaging:
    # Build the wheel and confirm every subpackage is actually shipped in it.
    # Guards against the class of bug where a subpackage without __init__.py
    # is silently dropped by find_packages, producing a wheel that ImportErrors
    # on `import hexus`. Inspects the wheel's zip contents directly (no install,
    # no torch/psycopg) so it stays fast and dependency-free.
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify all subpackages are present in the built wheel
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = set(zipfile.ZipFile(whl).namelist())
          required = [
              "hexus/__init__.py",
              "hexus/embed.py",
              "hexus/store.py",
              "hexus/embedder.py",
              "hexus/writer.py",
              "hexus/entity_extractor.py",
              "hexus/pipeline/__init__.py",
              "hexus/pipeline/router.py",
              "hexus/ccr/__init__.py",
              "hexus/ccr/cache.py",
              "hexus/webhook/__init__.py",
              "hexus/webhook/dispatcher.py",
              "mcp_server/__init__.py",
              "mcp_server/cli.py",
              "mcp_server/import_cli.py",
              "mcp_server/server.py",
              "mcp_server/tools.py",
          ]
          missing = [r for r in required if r not in names]
          assert not missing, f"{whl} is missing: {missing}"
          print(f"OK: {whl} contains all {len(required)} required modules")
          PY

      - name: Wheel installs cleanly (no deps)
        run: python -m pip install --no-deps dist/*.whl

  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check version consistency
        run: |
          # Strip 'v' prefix so v0.9.2 → 0.9.2 matches file values.
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          # pyproject.toml: value of the `version` key under [project]
          PYTOML_VERSION=$(python -c "
          import tomllib
          with open('pyproject.toml', 'rb') as f:
              v = tomllib.load(f)['project']['version']
          print(v)
          ")
          echo "pyproject.toml version: $PYTOML_VERSION"

          # hexus/plugin.yaml: value of the top-level `version` key
          YAML_VERSION=$(python -c "
          import yaml
          with open('hexus/plugin.yaml') as f:
              v = yaml.safe_load(f)['version']
          print(v)
          ")
          echo "hexus/plugin.yaml version: $YAML_VERSION"

          if [ "$TAG_VERSION" != "$PYTOML_VERSION" ]; then
            echo "ERROR: pyproject.toml version '$PYTOML_VERSION' does not match tag '$TAG_VERSION'"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$YAML_VERSION" ]; then
            echo "ERROR: hexus/plugin.yaml version '$YAML_VERSION' does not match tag '$TAG_VERSION'"
            exit 1
          fi
          echo "All version fields match tag $TAG_VERSION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run tests
        run: |
          docker compose -f docker/compose.yml --profile test run --rm test

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push image to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag hexus:test ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  release-pypi:
    needs: [lint, packaging, build-and-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC trusted publishing on PyPI
      contents: read   # Required to checkout the codebase
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          TAG_NAME=${{ github.ref_name }}
          # Check if the main branch contains the tag's commit
          if git branch -r --contains "tags/$TAG_NAME" | grep -q "origin/main"; then
            echo "Tag $TAG_NAME is on main branch. Proceeding."
          else
            echo "Error: Tag $TAG_NAME is not on the main branch."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Build package distributions
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
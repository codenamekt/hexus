name: CI

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Ruff Lint Check
        uses: astral-sh/ruff-action@v3
        with:
          args: 'check'

      - name: Run Ruff Format Check
        uses: astral-sh/ruff-action@v3
        with:
          args: 'format --check'

  packaging:
    # Build the wheel and confirm every subpackage is actually shipped in it.
    # Guards against the class of bug where a subpackage without __init__.py
    # is silently dropped by find_packages, producing a wheel that ImportErrors
    # on `import hexus`. Uses --no-deps + importlib.find_spec so it stays fast
    # (no torch/psycopg install needed to verify packaging completeness).
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Install wheel (no deps) and verify all subpackages are packaged
        run: |
          python -m pip install --no-deps dist/*.whl
          python - <<'PY'
          import importlib.util as u
          modules = [
              "hexus",
              "hexus.embed",
              "hexus.store",
              "hexus.embedder",
              "hexus.writer",
              "hexus.pipeline.router",
              "hexus.ccr.cache",
              "hexus.webhook.dispatcher",
              "hexus.entity_extractor",
              "mcp_server.cli",
              "mcp_server.import_cli",
          ]
          missing = [m for m in modules if u.find_spec(m) is None]
          assert not missing, f"modules missing from the built wheel: {missing}"
          print(f"OK: all {len(modules)} modules present in the installed wheel")
          PY

  build-and-test:
    needs: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Run tests
        run: |
          docker compose -f docker/compose.yml --profile test run --rm test

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and Push image to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          docker tag hexus:test ghcr.io/${{ github.repository }}:${{ github.ref_name }}
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  release-pypi:
    needs: [lint, packaging, build-and-test]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # Required for OIDC trusted publishing on PyPI
      contents: read   # Required to checkout the codebase
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on main branch
        run: |
          TAG_NAME=${{ github.ref_name }}
          # Check if the main branch contains the tag's commit
          if git branch -r --contains "tags/$TAG_NAME" | grep -q "origin/main"; then
            echo "Tag $TAG_NAME is on main branch. Proceeding."
          else
            echo "Error: Tag $TAG_NAME is not on the main branch."
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install build tooling
        run: pip install build

      - name: Build package distributions
        run: python -m build

      - name: Publish package to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1